name: Deploy Backend

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_CONTAINER_REGISTRY_NAME: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
  AZURE_BACKEND_CONTAINER_APP_NAME: ${{ vars.AZURE_BACKEND_CONTAINER_APP_NAME }}
  BACKEND_IMAGE_NAME: finance-foundation-backend
  AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${{ vars.AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT }}
  AZURE_DOCUMENT_INTELLIGENCE_MODEL_ID: ${{ vars.AZURE_DOCUMENT_INTELLIGENCE_MODEL_ID }}
  AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
  AZURE_OPENAI_PDF_PARSER_DEPLOYMENT: ${{ vars.AZURE_OPENAI_PDF_PARSER_DEPLOYMENT }}
  AZURE_OPENAI_TRANSACTION_CATEGORY_DEPLOYMENT: ${{ vars.AZURE_OPENAI_TRANSACTION_CATEGORY_DEPLOYMENT }}
  AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
  AZURE_DOCUMENT_INTELLIGENCE_API_KEY: ${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_API_KEY }}
  AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-backend-production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build backend image and deploy to Azure Container Apps
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail

            ACR_LOGIN_SERVER="$(az acr show --name "$AZURE_CONTAINER_REGISTRY_NAME" --query loginServer -o tsv)"
            IMAGE_TAG="$ACR_LOGIN_SERVER/$BACKEND_IMAGE_NAME:${GITHUB_SHA}"

            az acr build \
              --registry "$AZURE_CONTAINER_REGISTRY_NAME" \
              --image "$BACKEND_IMAGE_NAME:${GITHUB_SHA}" \
              --file apps/backend/Dockerfile \
              .

            SECRET_ARGS=()
            if [ -n "${AZURE_DOCUMENT_INTELLIGENCE_API_KEY:-}" ]; then
              SECRET_ARGS+=("docintel-key=${AZURE_DOCUMENT_INTELLIGENCE_API_KEY}")
            fi
            if [ -n "${AZURE_OPENAI_API_KEY:-}" ]; then
              SECRET_ARGS+=("openai-key=${AZURE_OPENAI_API_KEY}")
            fi

            if [ "${#SECRET_ARGS[@]}" -gt 0 ]; then
              az containerapp secret set \
                --name "$AZURE_BACKEND_CONTAINER_APP_NAME" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --secrets "${SECRET_ARGS[@]}"
            fi

            ENV_ARGS=()
            if [ -n "${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT:-}" ]; then
              ENV_ARGS+=("AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT=${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT}")
            fi
            if [ -n "${AZURE_DOCUMENT_INTELLIGENCE_MODEL_ID:-}" ]; then
              ENV_ARGS+=("AZURE_DOCUMENT_INTELLIGENCE_MODEL_ID=${AZURE_DOCUMENT_INTELLIGENCE_MODEL_ID}")
            fi
            if [ -n "${AZURE_DOCUMENT_INTELLIGENCE_API_KEY:-}" ]; then
              ENV_ARGS+=("AZURE_DOCUMENT_INTELLIGENCE_API_KEY=secretref:docintel-key")
            fi
            if [ -n "${AZURE_OPENAI_ENDPOINT:-}" ]; then
              ENV_ARGS+=("AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}")
            fi
            if [ -n "${AZURE_OPENAI_PDF_PARSER_DEPLOYMENT:-}" ]; then
              ENV_ARGS+=("AZURE_OPENAI_PDF_PARSER_DEPLOYMENT=${AZURE_OPENAI_PDF_PARSER_DEPLOYMENT}")
            fi
            if [ -n "${AZURE_OPENAI_TRANSACTION_CATEGORY_DEPLOYMENT:-}" ]; then
              ENV_ARGS+=("AZURE_OPENAI_TRANSACTION_CATEGORY_DEPLOYMENT=${AZURE_OPENAI_TRANSACTION_CATEGORY_DEPLOYMENT}")
            fi
            if [ -n "${AZURE_OPENAI_API_VERSION:-}" ]; then
              ENV_ARGS+=("AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION}")
            fi
            if [ -n "${AZURE_OPENAI_API_KEY:-}" ]; then
              ENV_ARGS+=("AZURE_OPENAI_API_KEY=secretref:openai-key")
            fi

            UPDATE_ARGS=(
              --name "$AZURE_BACKEND_CONTAINER_APP_NAME"
              --resource-group "$AZURE_RESOURCE_GROUP"
              --image "$IMAGE_TAG"
            )

            if [ "${#ENV_ARGS[@]}" -gt 0 ]; then
              UPDATE_ARGS+=(--set-env-vars "${ENV_ARGS[@]}")
            fi

            az containerapp update "${UPDATE_ARGS[@]}"

            BACKEND_FQDN="$(az containerapp show \
              --name "$AZURE_BACKEND_CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --query properties.configuration.ingress.fqdn \
              -o tsv)"

            echo "Backend desplegado en: https://$BACKEND_FQDN"

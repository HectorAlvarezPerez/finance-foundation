name: Deploy Backend

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: read

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_CONTAINER_REGISTRY_NAME: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
  AZURE_BACKEND_CONTAINER_APP_NAME: ${{ vars.AZURE_BACKEND_CONTAINER_APP_NAME }}
  BACKEND_IMAGE_NAME: finance-foundation-backend
  AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${{ vars.AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT }}
  AZURE_DOCUMENT_INTELLIGENCE_MODEL_ID: ${{ vars.AZURE_DOCUMENT_INTELLIGENCE_MODEL_ID }}
  AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
  AZURE_OPENAI_PDF_PARSER_DEPLOYMENT: ${{ vars.AZURE_OPENAI_PDF_PARSER_DEPLOYMENT }}
  AZURE_OPENAI_TRANSACTION_CATEGORY_DEPLOYMENT: ${{ vars.AZURE_OPENAI_TRANSACTION_CATEGORY_DEPLOYMENT }}
  AZURE_OPENAI_DEPLOY_SUMMARY_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOY_SUMMARY_DEPLOYMENT }}
  AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
  LANGFUSE_ENABLED: ${{ vars.LANGFUSE_ENABLED }}
  LANGFUSE_HOST: ${{ vars.LANGFUSE_HOST }}
  LANGFUSE_ENV: ${{ vars.LANGFUSE_ENV }}
  LANGFUSE_PROMPT_LABEL: ${{ vars.LANGFUSE_PROMPT_LABEL }}
  LANGFUSE_DEPLOY_SUMMARY_PROMPT_NAME: ${{ vars.LANGFUSE_DEPLOY_SUMMARY_PROMPT_NAME }}
  AZURE_DOCUMENT_INTELLIGENCE_API_KEY: ${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_API_KEY }}
  AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
  LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
  LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-backend-production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build backend image and deploy to Azure Container Apps
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_TAG_SUFFIX: ${{ github.sha }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: bash scripts/deploy-backend-manual.sh

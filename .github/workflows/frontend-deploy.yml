name: Deploy Frontend

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_CONTAINER_REGISTRY_NAME: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
  AZURE_FRONTEND_CONTAINER_APP_NAME: ${{ vars.AZURE_FRONTEND_CONTAINER_APP_NAME }}
  NEXT_PUBLIC_API_BASE_URL_PROD: ${{ vars.NEXT_PUBLIC_API_BASE_URL_PROD }}
  FRONTEND_IMAGE_NAME: finance-foundation-frontend

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-frontend-production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build frontend image and deploy to Azure Container Apps
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail

            ACR_LOGIN_SERVER="$(az acr show --name "$AZURE_CONTAINER_REGISTRY_NAME" --query loginServer -o tsv)"
            IMAGE_TAG="$ACR_LOGIN_SERVER/$FRONTEND_IMAGE_NAME:${GITHUB_SHA}"

            az acr build \
              --registry "$AZURE_CONTAINER_REGISTRY_NAME" \
              --image "$FRONTEND_IMAGE_NAME:${GITHUB_SHA}" \
              --file apps/frontend/Dockerfile \
              --build-arg NEXT_PUBLIC_API_BASE_URL="$NEXT_PUBLIC_API_BASE_URL_PROD" \
              .

            az containerapp update \
              --name "$AZURE_FRONTEND_CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --image "$IMAGE_TAG"

            FRONTEND_FQDN="$(az containerapp show \
              --name "$AZURE_FRONTEND_CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --query properties.configuration.ingress.fqdn \
              -o tsv)"

            echo "Frontend desplegado en: https://$FRONTEND_FQDN"
